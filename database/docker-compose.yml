services:
  fastapi:
    build:
      context: ../fastapi
    container_name: nexreel-fastapi
    ports:
      - '8000:8000'
    volumes:
      - ./backup_data:/app/data/backup_data
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-nexreel}
      - POSTGRES_USER=${POSTGRES_USER:-nexreel}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-change-me}
      - SESSION_SECRET=${SESSION_SECRET:-change-me}
      - BACKUP_ADMIN_PASSWORD=${BACKUP_ADMIN_PASSWORD:-change-me}
      - ALLOWED_ORIGINS=http://127.0.0.1:5173,http://127.0.0.1:5172,http://localhost:5173,http://localhost:5172
      - BACKUP_DATA_DIR=/app/data/backup_data
      - TZ=Europe/Madrid
    restart: unless-stopped
