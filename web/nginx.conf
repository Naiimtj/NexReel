server {
    listen 80;
    server_name _;

    # Cliente puede subir avatares / portadas razonablemente grandes
    client_max_body_size 25m;

    # Resolver de Docker para re-resolver el hostname del backend en runtime
    # (evita que nginx cachee la IP al arrancar y devuelva 502 si fastapi
    # se recrea con otra IP).
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $nexreel_api http://nexreel-fastapi:8000;

    # ─── API FastAPI ───────────────────────────────────────────────
    # Todo lo que vaya a /v1/ se enruta al contenedor `nexreel-fastapi`.
    location /v1/ {
        proxy_pass $nexreel_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;

        # Permitir cookies de sesión sin sobrescribir flags
        proxy_cookie_path / /;
        proxy_pass_request_headers on;

        # Timeouts amplios para subidas / operaciones largas
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # ─── Endpoints administrativos del backup ──────────────────────
    location /db/ {
        proxy_pass $nexreel_api;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Health check directo del backend ──────────────────────────
    location = /health {
        proxy_pass $nexreel_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Estáticos del backend (Swagger custom, etc.) ──────────────
    location /static/ {
        proxy_pass $nexreel_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Swagger UI custom (FastAPI lo sirve en `/`) ───────────────
    # Se publica bajo /docs para no chocar con el SPA en `/`.
    # Protegido con HTTP Basic Auth (htpasswd montado en el contenedor).
    location = /docs {
        auth_basic           "NexReel Docs";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass $nexreel_api/;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /openapi.json {
        auth_basic           "NexReel Docs";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass $nexreel_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /redoc {
        auth_basic           "NexReel Docs";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass $nexreel_api;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── SPA (React/Vite build) ────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Gzip básico para los estáticos del SPA
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/ttf
        font/otf;
}
