services:
  postgres:
    image: postgres:16-alpine
    container_name: nexreel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexreel}
      POSTGRES_USER: ${POSTGRES_USER:-nexreel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexreel}
      TZ: ${TZ:-Europe/Madrid}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-nexreel} -d ${POSTGRES_DB:-nexreel}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

  fastapi:
    build:
      context: ./fastapi
    container_name: nexreel-fastapi
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-nexreel}
      POSTGRES_USER: ${POSTGRES_USER:-nexreel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexreel}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-nexreel}:${POSTGRES_PASSWORD:-nexreel}@postgres:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-nexreel}
      SESSION_SECRET: ${SESSION_SECRET:-change-me}
      BACKUP_ADMIN_PASSWORD: ${BACKUP_ADMIN_PASSWORD:-change-me}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://127.0.0.1:5173,http://127.0.0.1:5172,http://localhost:5173,http://localhost:5172}
      BACKUP_DATA_DIR: /app/data/backup_data
      CLOUDINARY_KEY: ${CLOUDINARY_KEY:-}
      CLOUDINARY_SECRET: ${CLOUDINARY_SECRET:-}
      TZ: ${TZ:-Europe/Madrid}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_USER: ${ADMIN_USER:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    volumes:
      - ./database/backup_data:/app/data/backup_data
    ports:
      - '8000:8000'

  backup:
    build:
      context: ./database/backups
    container_name: nexreel-backup
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_DB: ${POSTGRES_DB:-nexreel}
      POSTGRES_USER: ${POSTGRES_USER:-nexreel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexreel}
      TZ: ${TZ:-Europe/Madrid}
    volumes:
      - ./database/backup_data:/backups

volumes:
  postgres_data:
